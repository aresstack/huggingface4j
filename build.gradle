plugins {
    id 'java-library'
    id 'maven-publish'
}

// Gradle is used for development, tests and local installs (publishToMavenLocal).
// The Maven Central release is performed from pom.xml via the central-publishing-maven-plugin
// (see .github/workflows/release.yml and PUBLISHING.md). Keep group/version in sync with pom.xml.
group = 'com.aresstack'
version = '0.1.1'

def generatedOpenApiDir = layout.buildDirectory.dir('generated/huggingface-openapi')

repositories {
    mavenCentral()
}

configurations {
    openApiGenerator
}

dependencies {
    api 'com.google.code.gson:gson:2.13.1'

    openApiGenerator 'org.openapitools:openapi-generator-cli:7.23.0'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
    withSourcesJar()
    withJavadocJar()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.register('generateHuggingFaceOpenApiModels', JavaExec) {
    group = 'openapi'
    description = 'Generate Hugging Face Hub OpenAPI DTOs only. Public library API remains hand-written.'
    classpath = configurations.openApiGenerator
    mainClass = 'org.openapitools.codegen.OpenAPIGenerator'
    args = [
            'generate',
            '-i', 'https://huggingface.co/.well-known/openapi.json',
            '-g', 'java',
            '-o', generatedOpenApiDir.get().asFile.absolutePath,
            '--global-property', 'models,modelDocs=false,modelTests=false,apis=false,supportingFiles=false',
            '--additional-properties', 'modelPackage=com.aresstack.huggingface.hub.generated.model,dateLibrary=java8,serializationLibrary=gson,serializableModel=true,hideGenerationTimestamp=true'
    ]
}

test {
    useJUnitPlatform()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            pom {
                name = 'huggingface4j'
                description = 'Small Java 8 fluent client for the Hugging Face Hub API, inspired by the ollama4j style.'
                url = 'https://github.com/aresstack/huggingface4j'
                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
                developers {
                    developer {
                        id = 'aresstack'
                        name = 'AresStack'
                    }
                }
                scm {
                    connection = 'scm:git:https://github.com/aresstack/huggingface4j.git'
                    developerConnection = 'scm:git:ssh://git@github.com:aresstack/huggingface4j.git'
                    url = 'https://github.com/aresstack/huggingface4j'
                }
            }
        }
    }
}
